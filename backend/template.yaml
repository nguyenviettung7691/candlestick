AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: VNINDEX Indicator Tracking Dashboard backend.

Globals:
  Function:
    Runtime: python3.11
    Timeout: !Ref FunctionTimeoutSeconds
    MemorySize: !Ref FunctionMemorySize
    Tracing: !If [IsXRayEnabled, Active, PassThrough]
    Architectures:
      - x86_64
    Environment:
      Variables:
        DYNAMODB_TABLE_NAME: !Ref DashboardTableName
        WS_CONNECTION_TTL_SECONDS: !Ref WebSocketConnectionTtlSeconds
        WEBSOCKET_API_ENDPOINT: !Sub 'https://${DashboardWebSocket}.execute-api.${AWS::Region}.amazonaws.com/${StageName}'
        POLL_INTERVAL_SECONDS: !Ref PollIntervalSeconds
        MAX_RUNTIME_SECONDS: !Ref MaxRuntimeSeconds
        PRICE_HISTORY_SIZE: !Ref PriceHistorySize
        STOCK_DATA_SOURCE: !Ref StockDataSource

Parameters:
  DashboardTableName:
    Type: String
    Default: VnIndexDashboardTable
    Description: DynamoDB single-table name for dashboards, symbols, and websocket connections.
  StageName:
    Type: String
    Default: prod
    AllowedPattern: '^[a-zA-Z0-9_-]+$'
    Description: API Gateway WebSocket stage name.
  WebSocketRouteSelectionExpression:
    Type: String
    Default: '$request.body.action'
    Description: API Gateway route selection expression for websocket messages.
  PollingScheduleExpression:
    Type: String
    Default: rate(1 minute)
    Description: EventBridge schedule expression for the polling Lambda.
  PollingScheduleState:
    Type: String
    Default: ENABLED
    AllowedValues:
      - ENABLED
      - DISABLED
    Description: Toggle scheduled polling without modifying code.
  WebSocketConnectionTtlSeconds:
    Type: Number
    Default: 3600
    MinValue: 60
    Description: Relative connection TTL in seconds used as connected_at + TTL.
  PollIntervalSeconds:
    Type: Number
    Default: 10
    MinValue: 1
    Description: Sleep interval between polling iterations inside one Lambda run.
  MaxRuntimeSeconds:
    Type: Number
    Default: 52
    MinValue: 5
    MaxValue: 55
    Description: In-Lambda loop runtime cap before exiting.
  PriceHistorySize:
    Type: Number
    Default: 100
    MinValue: 30
    Description: Number of candles to request for indicator calculations.
  StockDataSource:
    Type: String
    Default: VCI
    Description: vnstock source identifier.
  FunctionTimeoutSeconds:
    Type: Number
    Default: 60
    MinValue: 3
    MaxValue: 900
    Description: Default timeout (seconds) for Lambda functions in this stack.
  FunctionMemorySize:
    Type: Number
    Default: 1024
    AllowedValues:
      - 512
      - 1024
      - 1536
      - 2048
      - 3008
    Description: Default memory size (MB) for Lambda functions in this stack.
  DynamoPointInTimeRecovery:
    Type: String
    Default: ENABLED
    AllowedValues:
      - ENABLED
      - DISABLED
    Description: Enable or disable DynamoDB point-in-time recovery.
  LambdaLogRetentionDays:
    Type: Number
    Default: 14
    AllowedValues:
      - 1
      - 3
      - 5
      - 7
      - 14
      - 30
      - 60
      - 90
      - 120
      - 180
      - 365
      - 400
      - 545
      - 731
      - 1096
      - 1827
      - 2192
      - 2557
      - 2922
      - 3288
      - 3653
    Description: CloudWatch retention period for Lambda log groups.
  WebSocketAccessLogRetentionDays:
    Type: Number
    Default: 14
    AllowedValues:
      - 1
      - 3
      - 5
      - 7
      - 14
      - 30
      - 60
      - 90
      - 120
      - 180
      - 365
      - 400
      - 545
      - 731
      - 1096
      - 1827
      - 2192
      - 2557
      - 2922
      - 3288
      - 3653
    Description: CloudWatch retention period for WebSocket API access logs.
  EnableXRayTracing:
    Type: String
    Default: ENABLED
    AllowedValues:
      - ENABLED
      - DISABLED
    Description: Enable AWS X-Ray tracing for Lambda functions.
  WebSocketApiName:
    Type: String
    Default: VnIndexDashboardWebSocket
    Description: Name of the API Gateway WebSocket API.

Conditions:
  IsPollingEnabled: !Equals [!Ref PollingScheduleState, ENABLED]
  IsPitrEnabled: !Equals [!Ref DynamoPointInTimeRecovery, ENABLED]
  IsXRayEnabled: !Equals [!Ref EnableXRayTracing, ENABLED]

Resources:
  DashboardTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref DashboardTableName
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: !If [IsPitrEnabled, true, false]
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  PollingLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: PollingLambdaAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Scan
                  - dynamodb:DeleteItem
                Resource:
                  - !GetAtt DashboardTable.Arn
              - Effect: Allow
                Action:
                  - execute-api:ManageConnections
                Resource:
                  - !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${DashboardWebSocket}/${StageName}/POST/@connections/*'

  WebSocketLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: WebSocketConnectionAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt DashboardTable.Arn

  PollingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda_polling/
      Handler: app.lambda_handler
      Role: !GetAtt PollingLambdaRole.Arn
      ReservedConcurrentExecutions: 1
      Events:
        ScheduledRun:
          Type: Schedule
          Properties:
            Schedule: !Ref PollingScheduleExpression
            Enabled: !If [IsPollingEnabled, true, false]

  WebSocketFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda_websocket/
      Handler: connection.lambda_handler
      Role: !GetAtt WebSocketLambdaRole.Arn
      ReservedConcurrentExecutions: 10

  PollingFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${PollingFunction}'
      RetentionInDays: !Ref LambdaLogRetentionDays

  WebSocketFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${WebSocketFunction}'
      RetentionInDays: !Ref LambdaLogRetentionDays

  WebSocketAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/apigateway/${AWS::StackName}-${StageName}-ws-access'
      RetentionInDays: !Ref WebSocketAccessLogRetentionDays

  WebSocketIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref DashboardWebSocket
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebSocketFunction.Arn}/invocations
      PayloadFormatVersion: '2.0'

  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref DashboardWebSocket
      RouteKey: $connect
      AuthorizationType: NONE
      Target: !Sub integrations/${WebSocketIntegration}

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref DashboardWebSocket
      RouteKey: $disconnect
      AuthorizationType: NONE
      Target: !Sub integrations/${WebSocketIntegration}

  DefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref DashboardWebSocket
      RouteKey: $default
      AuthorizationType: NONE
      Target: !Sub integrations/${WebSocketIntegration}

  PermissionForWebSocketToInvokeLambda:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WebSocketFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${DashboardWebSocket}/*/*

  DashboardWebSocket:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Ref WebSocketApiName
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: !Ref WebSocketRouteSelectionExpression

  DashboardWebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref DashboardWebSocket
      StageName: !Ref StageName
      AutoDeploy: true
      AccessLogSettings:
        DestinationArn: !GetAtt WebSocketAccessLogGroup.Arn
        Format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","requestTime":"$context.requestTime","routeKey":"$context.routeKey","status":"$context.status","connectionId":"$context.connectionId","integrationError":"$context.integrationErrorMessage"}'
      DefaultRouteSettings:
        DetailedMetricsEnabled: true
    DependsOn:
      - ConnectRoute
      - DisconnectRoute
      - DefaultRoute

Outputs:
  DashboardTableName:
    Value: !Ref DashboardTable
  PollingScheduleExpression:
    Value: !Ref PollingScheduleExpression
  PollingScheduleState:
    Value: !Ref PollingScheduleState
  DynamoPointInTimeRecovery:
    Value: !Ref DynamoPointInTimeRecovery
  EnableXRayTracing:
    Value: !Ref EnableXRayTracing
  LambdaLogRetentionDays:
    Value: !Ref LambdaLogRetentionDays
  WebSocketApiId:
    Value: !Ref DashboardWebSocket
  WebSocketApiName:
    Value: !Ref WebSocketApiName
  WebSocketEndpoint:
    Value: !Sub 'https://${DashboardWebSocket}.execute-api.${AWS::Region}.amazonaws.com/${StageName}'
  WebSocketClientEndpoint:
    Value: !Sub 'wss://${DashboardWebSocket}.execute-api.${AWS::Region}.amazonaws.com/${StageName}'
